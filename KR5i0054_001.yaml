front:
  text: 微言摘要微言摘要序大道昭垂古今不易人心嗜好向背各殊然道之不明不行緣人之不知不好余自厯劫後證位仙班遇緣得度代天宣化為國救民矢念慈祥迎機勸善玄風大暢世有統宗故窮理盡性本于正心修身利物濟人不外居仁由義聖經賢傳具有微言一片婆心淵源相接惟願世之學者隨時隨地立德立功聆取意中之言默契言中之意味外有味精益求精庶幾道證玄微不僅身心均益矣嵓道人謹序
  hash: sha256:81704853573a7a3254fb7f607a1514a4f49132545005eb88c6c7bbfad0e31bc1
