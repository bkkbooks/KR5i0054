body:
  text: 微言摘要孚佑上帝著初修如望山林遠視糢糊難別漸近漸明漸行漸到到得山邊方識山行行行上上上又見草木與泉林始識煙雲變幻奇誠誠誠進進進登峯造極臨頂上萬物乾坤盡在中印證一輪皓月鑒明萬古千秋無邉道法勤參修養今須顚倒顚行持造化坎離先池中玉液頻頻咽肘後金津轉轉還玄中妙妙中玄得此神丹益夀年谷關緊鎖真消息終是天班不老仙勤採金花以助道風靜處煉氣閙處鍊神光風霽月景星慶雲無一毫乖戾之氣始合造化根苖但向起時作還於作處收蛟龍莫放睡雷雨直須休要會無窮火常觀未盡油夜深人靜後惟用子刻頭調息不廢真氣從生今人精從下流氣從上散水火相背不得凝結皆是此心使然心苟愛念不生此精必不下流心苟忿念不生此氣必不上炎一念不生萬慮澄徹則水火自然既濟姤結丹凝自古仙家真作法惟祕玄牝得真門夫玄牝者其白如練其連如環縱橫一寸二分包一身精粹在心下腎上處中坐靜觀照即萌百日立基養成氣母玄牝立焉如爪蒂嬰兒在胎中救護補益流戊就已添油接命助火載金火熾既濟胎成沐浴溫養丹成丹成總于呼吸蟄藏氣穴神凝氣聚立基之傳物我兩忘收視返聽合光默默調息綿綿以致寂然不動之境然後待乎消息到來發生英令駕三車而上崑崙過紅橋而歸土釜精神聚會混合玄關元神妙用自然精氣與神片時凝結從微至著自小至大行住坐卧念茲在茲修證功完陰陽交感胎息氣足玄珠成象結成聖胎皆自然而然不知所以然自神而神不知所以神所謂陰陽數足自通神也真火即是元神之運行元神即是真火之妙用真火隨真息真息隨真氣真氣化真精真精歸真土極至入玄牝元神發真火真精自凝丹須明玄玄理築基丹道全腎水也水生氣氣即火矣心火也火生液液即水矣水可以滋流百脈火可以薰蒸四大離中汞坎中鉛真鉛汞是先天一陽初動採鉛收汞取汞合鉛無非此息為妙用以至水中起火天地循環乾坤交復無非此息為斡旋其中沐浴溫養進退抽添皆映合天機濳孚造化而不容人力者真人之息以踵踵深深之意神者非思慮之神此神即火不神之神真火是也用意家黃婆想自兩腎之中先天精一之真氣以黃婆導引從左腹中右轉一周流入玄竅以鼻中一出一入之息為一度如是九轉引先天精一之氣納入玄竅之中然後注意竅中以火煆煉此正取坎填離煉精化氣用意之祕意土真氣自成之道貴守中法在含元人欲盡淨天理流行月到天心光明自然混體全癡迷自破道法無涯機運黃庭道同天地萬載常存陰陽二氣藉土化生試看生無不滅應知滅無不生循環化機常理昭然乾坤轉水逆流坎化離水火濟真氣屬陽精調和道始成息息歸元竅時時煆煉顯神功水中鉛火裏汞取來歸土釜溫養鼎爐中不寒不燥非急非緩專氣致柔含光寞寞漸採漸凝漸結漸煉動靜之中更宜消息無象可象神結於氣氣結于神一意沖和包裹萬象混沌萬物生皆死元神死復生知寂照自圓通谷神不滅因胎息臍間元氣結成丹進進不巳長生門戶要綿綿煉演谷神息往息來無間斷真玄真牝自呼吸漸隨無念窅微覺有身浮以神歸氣穴丹道自然成坐靜功運呼吸明爐鼎須知玉蕊即虎絃水銀是龍弦二弦之氣調停合和元氣得長存造化返天真合元功聖胎成一時之中分子午卯酉優游沐浴功文武火煉丹爐工夫無間斷坐來自異靈鉛汞調和入土中迎送動止守成十二時中溫養沐浴得玄得妙通聖通靈達境惟心出纒真如下手確祕密丹工統在精進明心玄牝返照悉皆委之於意抱本還元性命即歸太極第要誠堅詳參今書三百四十字深根固蒂守中抱一有心守之即著想無心求之則落空如如不動寂寂兩忘神戀氣而凝命戀性而住不歸一而歸一不守中而守中性命由此立竅中舊物存悟明本源還萬事畢功坐金花顯顯玉蒂滋萌須用靜定之功剝洗往復之妙自知升降之宜然庚方月現子時癸生光天真一之氣當是之時真之正源至淸習定凝神愼其內閉其外意迎意送得天性之道天命之妙混沌為一濳藏飛躍懲忿窒欲水火既濟金木交併真土歸位自然神歸氣復充塞天地黍米源根昊天沛澤仙道成功真機妙用廓然無際渾然大中不偏不倚昭昭圓明本體洞徹何曾有礙至靈至神本無方所未有天地萬物先既有天地萬物後元如此只如此至無至有至有至無乾坤之靈體元化之玄樞人人性命根萬類真源本太極由出八卦從生便是道即是易性由我定命由我立性命皆由我還丹道必成須用志不分坐而凝神即可通造化之源然功坐至於心液下降腎氣上升得會至於黃房氤氲不散灰心冥冥丹芽肇萌虛靜之中丹其物內成明翕聚知蟄藏聚為表蟄為裏凝神入氣穴土釜牢封固運陰陽合呼吸以呼吸運神氣以神氣取水火以水火煉胎息胎息綿綿游泳坎離坎離交而生金液金液還而丹圓道涵天地神統百形形皆生滅性無生滅形難固性常存陽光一點超千劫煉育元神性海明能造形能留形常參道法知玄妙雙修性命合天機守斗守斗只言心口心口歸來何曾你有太虛照耀驪龍吟吼摩尼寶珠常常穿走大藥為漿元陽作酒三五百十十一二九只此玄機請細分剖離得此些微豈能返衰朽絶欲則有鉛汞藥材生除妄則知真土和合訣在苦志苦為既進復進苦不辭苦進不辭進開門若閉對面如無外行善事內耽善行依功恆習遵道敬行敬持忘其爾我純乎道德度世度巳不怠不慢養氣養元調和內外運以陰陽形神牢固愛欲力降巳知假合解得源頭歸源復顧假應是現既假復假復假克除能保厥真真亦自固真之固矣道在是也守一得訣忘機得道守真一於天谷氣入玄元即達天真真道養神若能守知於死氣之關枯骨皆有生氣生我者道活我者神將神守道以道養神致精氣神只在真息上尋真息為先天之靈竅自其真息凝聚不散謂之精真息流行不間謂之氣自其真息之妙用不測謂之神此所謂用先天用先天後天皆為先天所化也其地之虛中皆天也日以陽下降可見地之虛處能受其人一身皆地也而玄牝一竅中虛即地之虛天之中也在修道者性中一點神火照入即三日所以搆精也搆精則庶物薰蒸山川出雲自無窮造化神淸氣逸總出自然凡有慧智之根者自能參悉息上也法在處紛不紛居亂不亂向上一著厯聖祕之凡世罕知心死原來一念無須知神活混元初一息尚存皆可常常長存尋出來時舊路元始祖氣相通息息歸根入竅漸漸通神達聖谷神何處立天根聖聖相傳玄牝門呼吸踵注於受生之初在母胞胎一點元陽立命之處上通於心臍後腎前中餘寸二即名腔裏召搆靈陽呼吸綿綿內呼身中元氣外吸天地正息鼻之兩竅呼吸之端欲通祖竅守中抱一方才子母會合得其破鏡重圓常操此心退藏脊竅則天地之正氣可扯而進與已混元真精凝結丹田認定此竅守而不離久久純熟則裏面皎皎明明即如月在水中方識長生真可證飛升本路此中尋功在不落人相不滯人情奮于自進大道生天地無私故常存天地生人物愛欲速其身哀哉世衆生難免輪回劫是以上真藴好生之德開度世之門道法無邊法在貴於呼吸暗注機竅丨一呼一吸得法暗注全欲一凝一結靈妙無端虛胎靜育虛極靜專含衆妙而有餘功訣玄妙神氣合一混一鴻䝉踵息純熟樂萬億之長春道本太虛胎息一氣天與地乃太虛之真胎日與月乃太虛之真息人體同乎太虛天地日月包羅無息不胎無胎不息胎從伏氣中結氣從有胎中息納氣丹田定心覺海若春沼魚似百蟲蟄浩氣融融靈風習習固守虛無涵養神氣知神氣可長生神行氣自行神住氣自住心定則神寧神寧則氣住無去無來無出無入胎息定金木交心意寧龍虎會住息長胎聖母神孩返本還元是真胎息此傳法訣得飛升千經萬典脫舍難難難難忙瞎煉抱氣冲和虛心靜默將一點真元之氣踵注于臍腹正中默想玄會於虛間機竅內存無守有回風混合超千劫復元初煉育元神道圓明微以意而定氣道原一氣貫虛空靈妙元神在氣中氣會於神神馭氣氣凝神聚法圓通目至心至心至意至意至氣至氣至神至行功採運貫悉煉守之法以期圓成只為本本來一點虛明真性命根藉陰陽五行陽火煅煉自然而成之至真境界永劫不壞但玄牝一竅至玄至妙之機關人之真氣一呼由此接天根一吸由此接地根往來必由此關口即真息呼吸之機關正為玄牝一竅玄陽牝陰是竅也始有此身八脈九竅經絡聯凑空閒一竅穴至虛至靈藏於先天混沌之中隱於無有有無之內父母未生此身即有此竅元氣所由生真息所由起坎離交姤之鄉守中之境是其處鼎也凝結聖胎於此心下一竅名綘宮龍虎交合直下三寸六名土釜黃庭乃中田左明堂右洞房無英居左白元居右空閒一穴一寸二分藏精之所煉丹之鼎直下至臍門對過三寸六故謂天上三十六地下三十六至腎八寸四中丹田一寸二計來八寸四若明此竅易得金丹之妙鉛是先天氣汞是後天靈後為先但得生鉛何患真汞不生凡百作為皆主於意色聲香味觸皆關於意意為即為意止即止故求丹取鉛以意迎之收火入鼎以意送之烹煉沐浴以意守之溫養丹結以意成之故入藥鏡云一日內十二時意所到皆可為此大要之要捷也道在天然法本無著不採而採方為採不取而取始為真注意規中兩腎中有棲神窟橫穴周通一身為治命橋守一實大道之本五千妙旨得一事畢天淸地寧發育無窮守一於玄竅大丹自成守一於天谷真人自現守一於淸靜大道自成守一於虛空法超三界一統天地陰陽妙合妙合不散成真乃得道在採藥人人本有不採則藥不成不煉則丹不結是以採取藥物于曲江之下聚火載之而上升於乾乾坤交姤於九宮之上周天運之而凝結於鼎逐日如此抽添如此交姤汞漸多鉛漸少久則鉛將盡汞亦乾乾坤交姤外藥先取卯酉周天內藥功成外藥一升一降後上前下內藥一起一伏左旋右轉道明中一竅妙宜通妙歸合一竅居中竅妙源流郤是同守一歸中連竅妙竅中妙一法神功火逼藥過尾閭乃坎離交姤須養子午周天之藥足有自然之真火相逼尾閭沖透三關而上乾頂從喉而落黃庭是謂乾坤交姤之大周天也道歸于一一煉于無原一氣之周流憑蟄取以成形散之則有萬殊斂之復守於中煉一以靜煉靜以一煉一以虛煉虛以一道成於一丹圓于一意一而身心會心一而龍虎交德一而鬼神護誠一而道志堅精一而道基固氣一而抱於神神一而會于氣歸一而聖胎圓自歸一而得一自得一而超一有作有為功用兼全天機自然固真能不漏德厚定丹圓道重真火真火妙用煉乾金結大丹無火不煉無煉不結是以火為至重厯古仙真祕之自上至心之七節君火所寄其體內陰而外陽其用廣大而精微一身莫不聽命于心君故曰神明之主然其性上炎極易飛揚流動是以修丹之土必先制服其心使其火不炎于上得以下交於腎謂之水火既濟制之之道至淸至靜則水火調而大藥生由心以下之七節相火所居是謂先天真陽之火當無漏無泄使真火之充足用以煉藥結丹故曰陽關一閉箇箇長生大哉真陽之火人以此火而生以此火而養以此火而化精微以此火而發生氣血以此火而重結靈胎以此火而超凡入聖心下七節之火妙用無窮特發其奧遇緣難度道難堅志難夙根不昧更尤難先天之道雖不屬氣而太和元氣浩然之氣皆由此出所謂無氣而生氣而凡有血氣者莫不賴之以長上配乎天下配乎地天地氣合萬物發生