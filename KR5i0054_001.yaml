氣本於先天統乎後天藉父母之陰陽一氣而形骸之後天有之知覺運動實賴元神統之成真證道必藉形骸養育坎腎原為真水精氣出于腎中精以氣而化水水出氣而化精是以精金能生水故生金精之氣法喻真金點作喻思氣化精時氣在精中精化氣時精歸氣中故曰金為水母母隱子胎水為金子子藏母胞母藏子腹如金在水中精復于氣水中出金當修煉之初如從根發出苖先而為藥乃虛無之氣耳實無形相而虛無恍惚採不見所採取不見所取採取之久火候之足精還補氣之盛謂之丹成其氣之發生始有法成之妙相而陽化之氣根始動以其是金氣也故有金丹之號道合天時子午運行人有任督如天子午二脈分乎前後本一源而兩歧任脈起于臍下四寸穴居中極之下前陰後陰之交名會陰穴任由會陰而行腹督脈之源亦起會陰少腹後骨中央由竊漏而行背夫背後尾閭夾脊玉枕曰三關謂之督脈本屬乎陽前面上田中田下田曰三田謂之任脈本屬乎陰修丹之士煉至真氣充足消息到來下田忽然如火向尾閭沖關透竅此皆真氣自家妙用二脈交通真氣逆升自背後督脈中上來即屬于子自前面任脈下去即屬于午子午抽添謂之周天火候身中水火一升一降升則為進火謂之抽鉛降則為退符謂之添汞鉛是一點真陽之氣汞是一點真陰之精二氣交感則凡精凡氣皆化真氣為純陽之體益水進火升降無非一氣氣之升以心接之為火氣之降以靜待之為水此綿綿若存之時乃子午進用之功道在乾坤法重鼎爐非淨不能安爐非淸不能立鼎道由于數緣在數中肇鴻濛而判二儀由二儀而生八卦情現萬物機緣始終均得包乎數內無非寓乎世緣得失數也行止數也道也數也機遇緣也聚散緣也道也緣也非緣而莫遇非數而不成一始而萬派萬派而終一五行以意之緣合八卦以一之數成修道長生訣在心靜氣定心忘氣凝氣息心空心氣渾一明心見性須靜篤而誠煉身中之元精不離元氣煉到氣足而無漏竅將腎中真元之精而返成氣得元氣足如童子之完體便可長生修至德厚宏深法力精純自與天地同久則為仙矣一神之妙一意之用意遠而神遠意近而神近意變而神變意收而神收神由意意由神身心意到底不離非意之運用安能超出乎天地是乃出神入化之密旨修真之士窺破有限之軀修煉猶恐不及慕道常如飢渴悟中悟進中進淸中淸靜中靜使一神之澄徹會五氣於黃宮陰陽合而萬物生水火濟而真氣凝大道不離方寸妙穴常存至道月照丹臺潮生海底箇中玄妙處就裏見真詮粉粉碎碎空空洞洞太虛中何曾有物乾坤內如何發生靜中靜動中靜動靜之機化虛中實實中虛虛實之理證幽微玄妙道無邊際由乎天地返乎人身神理獨超萬物氣機重立乾坤否極泰生天機地發陰陽五行化育之道原在吾身陽動陽動藥苖生漸生漸長要工勤養成無極太和枝返視黃芽照眼明這段玄機應識莫教錯過光陰否極原來功用時泰生始見藥苖新無功用怎見藥苖無藥苖不明功用功足用到大藥現靈苖長採採採採來配合混元丹取取取取來團作長生藥一時間天機煥發萬象盡含春道以淸靜為宗德行是重誠修誠煉閉竅為無漏之因元神妙用于屯䝉真氣升降而姤復父母生前元始初復金水功用金水的旨混沌初分刻真人入綘宮根源一點注玄門漸染萬端塵忘郤本來身僞僞無邊妄妄踵生從此來從此去真不真迷復迷堪惜踪影難尋那識元初本景有捷路上瑤池由開闢覔因由無窮造化箇中藏今古神仙就裡出試悟因由如何開闢只是綘宮一念塵非頃刻靈源幻化順流交泰圓成天開地闢覔因由造化無窮萬法通今古神仙從此出均從交泰一源頭不息不息機緣無盡一點無明前因後因因緣湊合心火隨意土順而成既濟於此立根源靈明寧有極修真修真反順于逆腎水隨意土逆而成既濟靜中動動中靜自入三淸聖境確信長生妙理水升火降逆成仙也精微至要在于坎離法重水火之金煉貴紅黑交凝火中之熖觸物成濕丹家謂之木汞即火中之精心中之真液也水中之氣浮而成煙丹家謂之真鉛即水中之金腎中之真氣也離宮火熖屬真陰靈液紅光汞在心欲識水中金的旨真鉛陽氣坎宮尋煉煉煉降離火以煉坎水之金以紅而投黑神凝而藥自生于坤臍制制制升坎水以制離火之木以黑而見紅神凝而丹自成於乾頂故修丹之士必以水中金為至寶動靜功用必合金水機關方臻天然妙理欲煉太虛同一體逢人先自學如愚百日功靈初證便得長生無漏無漏精巳化氣下田為藏精之府中田為氣海之源化氣歸臍臍乃中田百日巳得長生為人之仙若用以服食氣便化神神得氣化神成真體十月圓成自當遷于上田若只拘神在上亦是長生超劫之愚夫而無神通之妙用須用出神之理調神為身外之身且調且養濟世積功保護三春方能達天通地萬化千變謂之神仙若厭住於世則可從仙而還虛以證無極之至極為上乘之金仙矣水火本為相剋坎離既濟又反相生故貴化神至靈紛體則易消故貴變是以散化五行而變通萬神上天下地一氣流行陽數至九而純九氣陽純煉去陰邪映發光華出於霄漢靈魂居上關元居下陽屬於氣輕淸而升為魂至虛至靈全具於心陰屬於血重濁而降為魄質從水凝源出於腎密戶生門出入日月呼吸長存飛升而仙自此以下俱釋黃庭內經大道之源真一元氣先天之我藴而藏之心外原無道道外本屬無心方寸之中存存念真真我自藏藏而不露方以矩成不免有稜角之滯圓以規運不免有轉動之勞牖以納物不免有外引之隙窗以通明不免有內窺之竇此所藏之真則不方不圓和光同塵常寂常應閉窗扄戶守禦固密屏除外欲三神集而精還老當復少戊陽魂巳陰魄惟三神之精不還遂致魂魄不寧故不能守其真戊巳合真魂魄相拘而方寸之中一元內守和順從容何爭何競神生腹中金液滋滿而如玉之鐺元神靈氣注于幽關常存不失注其根如琳琅之條蔭茂萬尋可為恃仗丹靈神通五氣朝元天眷即邀華蓋覆珠九幽光燦以內照而外觀朗如日月之明麗空洞察衆有悉陳審能自見赤珠靈裙虛靜而顯圓明光動而生靈妙光華蒨燦輝煌普照意本從心一入於邪無所不至故見心但屏外誘修脾當克已私生生不息訣在存真各真其真本體精明內自運乎天經天經一氣流行生生不息之脈絡晝夜功用勤勤仍須意念存存內出惟寡外入惟衆知內以感乎外知外以應乎內上致明霞日月華發參破生門之訣下手著著存神漸漸合延延生華芒存思登虛殊途一會相有而不可無相資而不可離配合待對之體相望相求之情殊念經翔長生出世萬象昭回開通七竅俟一氣之流行即以進陽退陰火力為先符佩為圓尚修於靈關金唱于前木繼于後前者昻後者卑昻者高卑者下心樞天定萬目鋪張黃極正名紀綱畢舉故以前昻而後卑使高下之皆陳由是執雌雄之神劍回七十二候之要津舞百丈之錦幡奪三千六百之正氣劍乃金水之精所鑄幡乃龍虎之氣所融一數之始十數之終戊午巳五合而成十絶其危險錦幡百丈火龍凝金水真精鑄劍靈一始十終成二五煉來妙合巳全形黃中扄固虛靈槖籥扇動巽風元氣紛紜當此元氣鼓滿水火受制非制之有法則火龍飛逸煙熖騰空惟金得用乃火因水之上升而下降沖霄之烽煙方斂息與金結作一團百煉沖舉千變萬化微妙圓通周天三百六十五度陰陽升降自然不息一身之內與天同符上而泥丸玉池玄膺降而重樓明堂鵲橋元海下而尾閭湧泉其間六脈經絡正如星辰之纒次嶽瀆之尾輪五臟六腑以配五行合乾坤之呼吸出日入月首圓趾方均相符合而運用之精盡于內景經篇真經出世之源由上真司命柴母元君慈度得道真仙無不由此經精研入聖道法于元連珠循環天元行乎六陽地元行乎六陰太陽到午太陰到子二物合璧于中元如珠之連周而復始運行不停乃天道也握固以足元神則當觀天之道執天之行法陰中之陽地中天元升於午法陽中之陰天中地元降于子會中元而循環不息則五臟之精英落落光明明景內照如燃炬通霄光被九隅煥映八區黃紫燦然丹結於內充溢繁盛陽升陰降如日月之合璧五行環轉如列宿之交陳外而七曜光明內而九元相聚光彩如霞錦玲瓏似玉華津液滿口而灌溉天機在我斗柄橫空映發光明上透霄漢回紫抱黃瑞色集而丹圓大道生天生地生人自未有天地之前即有其主持造化天地皆其所生天地既分之後惟得舉功而歸之於天從道名太玄圓覆之本體也太和陰陽合會之元氣也有此太和元氣流行不息生人神氣凝而聚丹大道原生天地人陰陽合會本來真流行不息無窮止宜化功由覆載春則太玄之本體惟是無為而巳故太玄太和挾持端本元氣化生萬物即可本此元氣而作仙由得太和元氣入於身中養成玄珠與上天太玄之體同其運量得以飛升一氣調平陰陽自合心為一身之主氣為周流之帥道德原具心中動靜毋間其功道德始為我行意念從心所發媒合中央水火念念無間淸虛靜潔因得善氣相迎自然煥發光明心光內照從心主宰行則燭照事機如耀息則靜養平旦收藏妙合陰陽莫非此心之運用故能通利精神調理陰陽法周天之數經厯六合優游卯酉為沐浴之鄉雖不行其火候而一神常抱須臾不離火上炎而本升水潤下而本降運轉回環水升火降蓋離中原有一陰環轉則升起坎中一陽剝轉離中之陰而成純乾此為轉降升藏九為陽數雄陽雌陰白陽黑陰先天真一之氣為一陽原具坎陰之中內實有真陽之氣知採陽鉛始得結胎成聖用吸返元訣修丹證果處中制煉復立乾坤混金鑄就一氣陰陽交泰逆用乾坤反覆水火木金四象寄土於中各旺以一氣之會合而玄珠成象制煉還源法處中乾坤復立與天通混金鑄就長生體會合丹成十月功土從火生色赤如丹則明交後之色象識未煉之功用離位前仰坎位後卑各有其門火自木生水自金生水火雖異而可合以還丹惟收天一之玄泉逆流以成至寶色赤如丹火土生坎卑離仰各分明玄泉天一頻採取送入泥丸至寶成然如龜之鼻自然引氣靜以得其氣之往來而無出入之跡象龜之引氣方能制其靈根運歸土釡靈根本是真人真人在中能取首經之金以煉方成彼則負此金為甲持火為符開通七竅之門奪得子來吸受金精有此玄泉送以還丹實為用吸返元訣要今古諸仙由此飛升如龜引氣法天然虛靜微微妙裡玄二土運成刀圭藥飛升金煉五行全五行幻化運用精微撮而為一寂然固藏散之為萬周遍世界無盡而有盡有盡而無盡有盡為塵生塵滅無盡為修證修果夫一氣之流行聚散本無常經陰陽原屬混融五行禀受真源生寄也滅歸也任其散而不收焉能寄而不歸攝其機而撮合自然萬古不磨虛兮靜兮得其淸寧撮兮聚兮得其靈脈合一陰陽一氣本流行聚散原來萬物情撮得五行歸一處不磨萬古自淸寧知謹固用運升降自然妙合天機溫蒸生物無形而化有形神也氣也陰陽五行也撮合以成其妙凝結以致其神神依氣而堅氣依神而化修有實證之驗煉有可計之程返本元於百日育至神於十月調攝三周妙用無邊用撮之法歸一妙諦宏慈廣布委脫飛升自然升降合天機始得溫蒸生物奇神氣相依無化育還丹證果約程期雲蒸雨布灌溉五華靈根堅植元氣滋溢紫煙上下周流三素氤氲騰躍氣運其脈血滋其液自然通達流動方能冲廬入鼎幽室陽門光耀現色瑞於三田雲蒸雨布溉靈根元氣氤氲金液盈通達自然成妙用衝廬入鼎育元精天開地闢歸根復命玉液太和頃時天地會合冲和氣釀瓊漿玉㽔初生金關重扇機動樞轉脾運靈柯鼓扇兩扉坎內陽鉛得渡上接離中陰汞鉛至汞迎彼到我待由金闕而上升從玉籥而下降調和往來全是靈柯運用樞機貴密方得陰陽媒合醴泉香潔太和羹無極爐中玉㽔生靈柯鼓動天機轉媒合陰陽自降升虎躍龍騰精氣混成自得津生玄竅方能洋溢玉池舌下為玄竅口中為玉池䑛拄以迎甘露毋使滲漏妄溢得此瓊漿太和氣化實由金生之水為養丹之至寶溉灌周流無飢無渴世味遠而真神旺金津現而道成矣津生玄竅玉池淸虎躍龍騰氣混成䑛拄謹迎甘露降靈泉灌溉養真金此用䑛之要訣閉關握固塞漏禦泄止念除妄澄徹靈明使精足而氣旺則神全以運用虛無為天之體人禀先天一氣亦自虛無而來虛者實之基無者有之根既實而有遂至萬有紛紜不能返一虛無是以去天日遠一乃太極虛無為無極惟得一長生乃能虛無所貴秉德堅修勇猛精進虛無一體與天通萬有紛紜道不同若能秉德堅修志得一長生出世雄大道虛無由於得一修一煉一謹敬防守毋使漏泄蓋氣漏形枯尤當專氣致柔垂簾塞兌謹加閉守而御景忘機永長寧謐淡然無欲三奇通靈謹加閉守靜忘機返照淸明自見奇涵養谷神臻至妙五行神化夀天齊閉視返照內體淸明謹守至寶如龍護珠三房通達谷神不死積功純一壘德重重此為用閉之訣以上自用吸返元訣至此乃吸撮䑛閉四法為入道徹始徹終上古未傳祕要隱明蓄氣微妙斯明靈丹內著煌煥于中當蓄氣以致真宜隱明而進煉惟暗于外以明諸內蓄伏于下而逆於上窮微入妙日益知彰吐熖光芒漸靈漸徹必先之於混俗天機方能活潑居閙中以煉靜真源始有把握脫姤離塵淸虛入妙一真自現日月輝光玄丹為物晰之為三則曰精氣神統之為一則曰本元正一惟三氣逆而右回則內陰之九竅返照光明而正一之真丹含蓄英華積纍充溢遙望一心之中日月合璧五星聚奎如北辰之樞中星羅列環繞於中自使氣固神全室堅於金真元不傾返還永固居中御外經厯六合高而泥丸天谷卑而綘宮玄鄉氣固神全渾似金真陽出自坎宮陰周流六合無窮極神室靈丹貫古今腎之精水之金天地之祖氣順行而為常道逆行而為仙道成人成仙關鍵妙用故順行為五濁世間法結精育胞而成胎化生逆行乃顚倒坎離留胎止精而淸修亦孕長生超出惟在淸虛證果變化圓通原是一神入妙道真神衛積功純一閉視返聽內景光明自然通體神全方能氣溢三田丹非外物原起於形生之中即以其人之道還治其人之身始初本為我物今則喚來歸舍途非遠濶近在三宮只是坎離戊已得于混一還元易于隱微通括收攝成其造化真一之源原從靜裏出來而虛無寂寂色自空中素質散現使在形中通達洞視高潔陽明用時慧定生明九室虛而能受正為神明所舍神既守而不去猶當愼終如始息息守藥念念中規得棲吸聚源神脈抽添溫養視乎節度脫胎換骨非復頑然血肉之軀遊行天地翺翔自得得超欲界於紅塵輪劫身入淸微禹餘太赤之境矣以上十五節釋黃庭神氣機關統地天靜中妙用化形仙長春駐景非虛幻勤詢先修出世筌中一混元動靜機分陰陽施化二五交凝如天之妙大易已著其文其動也闢其靜也翕不闢則不翕不翕則不闢闢兮翕兮生育無窮動極生靜靜極生動一動一靜互為其用一升一降成其造化此皆靜極之功出于自然莫錯過真子陽生應覺玄機動處方明急水灘頭下篙無絃琴裡知音妙妙妙玉蕊初生元元元金闕初關天然真火燭虛空水裡機關照斗牛日月循環轉烏兔結姻緣道本陰陽淸靜真宗法先補救一身之內一氣相求乾坤定坎離交水火濟化機生心火腎水真液交凝可奈凡塵有錯悟修行本旨者妄為愛欲自促天年夫情動欲生火熾水涸真機濳息安得長生一念之非萬劫難尋大道全真五官忘用息機內外體合太空湛然一性靈明忘而不忘規中一氣綿綿息而不息寂寂不動默默守聚杳冥恍惚之際造化融成一片源于臍腎之間晝夜功無間斷彌厯十月奪大數於天地得乎片時成妙用於水火固志抽添念動而散入卯之門法當抽回使念靜而息定出酉之門法宜添起使奮迅以調進念更無念丹圓純熟全真大道至神至妙無非一真妙用皆由神氣凝成是以有志長生斂其神以藏用攝其氣以藏神道證真全長生萬古天地盈虛陰陽升降往來運行消息乎中一陽生于庚方陽純滿于甲地陰衰陽盛丹結圓明性命全形惟在陰陽合一靈奇微妙尤貴逆旋造化因氣凝神以命合性無為妙理惟簡惟易一水初凝氣化金生由金氣以化精從煉精以化金精以立基基築下田靜極精無漏竅自得氣化遷中精返於氣大藥苖生已得神氣歸根方為性命合一神由氣煉煉氣化神神成而遷於上由上以出重樓皆自然之妙實化生之本道本陰陽交感化生陽剛陰柔互為興起分剖以列四方子午基於動靜運成綱紀合乎易數一者水之生數九者金之成數一而九九而一北而東東而南南而西終而復始坤亥含元交感陰陽造化生剛柔動靜運成功數歸一九金中水西北東南始復明無陽不生無陰不化非神無以交氣非氣無以凝神毫妄動危險隨至嚴密關鍵進退有法靜補本元之氣淸救天性之神昔曾有言傳世吾道雖是房中得之然非御女之術耳絶欲不漏坎水充足腎氣上升心火下降交感氤氲羲文既濟甘露瓊漿天降金波玉液地升潤枯枝成造化三才渾一仙家玄妙至陽赫赫至陰肅肅天地位而發育致於中而自和非中不和非和不育道在守中化機和煦一陽始動娥影生輝法天應地一體彰明至誠布德重重陽光舒熖綿綿堪惜世界凡夫舉念不善厲氣滅光自墮沈輪是以道藉于德德護于道無德則光不舒無道則光不真道德並隆陽光至真在於無念以發其光回光以育其光翕闢以煉其光固守以成其光光中有氣氣中有神神中有氣逮於圓明修應混俗天機方能活潑閙中煉靜靈機免於澀滯氣發乎地神通于天三元妙合八卦彰明龍騰而雲從虎躍而風生雲從雨降風生火現風雲水火際會交融結成一片即是靈丹機兆得先瑞徵于後虎躍陽生應類而動必忘情而無念務靜氣以調中汞液由根始發鉛華自蒂而生一陰一陽消息一往一來妙用化無生有化有生無藉真意以媒合歸土釜而熬煎逮於明生昴畢必自始於箕斗兩弦平直二八功成三才合一道體通明虛極靜篤便覺陽生于地方識金萌水際呼採吸取自然陰降於天乃得木生火中先天混然造化在中探玄知妙尋覓真踪真踪真踪南北不分東西難隔四歸于一月色光輝初照地底雷鳴方動乾坤春意融融方顯修行面目出世因緣大果以日魂之升沈應氣血之升降以月魄之盈虧應精神之衰旺以四季之節候應一日之時刻以周天之星數應一爐之造化採精神以為藥取靜定以為火以靜定之火而煉精神之藥效日月之運用與天地以同功幽濳變化重其用而不重其體主宰造化重其體而不重其用心中有神精中有氣心之神有中無也精中氣無中有也心為一身之主神到氣到氣為生育之根氣旺神旺合陰陽而交感配造化以飛升必使心如止水方能氣自雲行氣本有自行之路且有必行之勢反在無心得之非關意所能行固守精神則心地自然光明心光內照則法體便得圓通人之心身一小天地祕鑰玄關栽培元氣氣之所行一日一周功宜涵養無待他求元氣流行一日周栽培涵養要誠求若能整密加功去此是周天第一籌純陽純陰故分九六各有所用一畫二畫變而為屯為䝉盡是易理所伏其中變化無窮須要靜參可得虛靈未可染纎塵無著無依最渾淪只待感通分動靜方知造化貴存神淸心一點萬理俱玄靜性參玄無微不入吃緊功夫當在幽獨非正心以修身大道莫見不存心以養性至理難窮祕中訣不老春靜裡觀自心朝暮持參詳虛中之極以虛而受靜中之運以靜而成散者成氣聚者成形葆至真之氣以全性最玄最妙本至精之氣以立命通聖通靈蓋天之覆地如卵之包黃太極既生兩儀乾坤乃生六子二氣交感禀元化以絪緼萬物資生轉洪鈞而孕育故三才有天地人之分一身有精氣神之別坤在靜中求動有為始于無為必須伏氣乾在動中求靜有象歸于無象只是還虛煉日烹月火蓮開于池爐旋乾轉坤真氣通乎槖籥陽九陰六地天交合而為泰男上女下澤山相感而為咸事有萬殊理歸一貫生生不已既已閲人成世閲世生人刻刻參詳須知無時不然無處不有吾道雙修立功立德藥物斤兩火候要熟夫火者吾之真神氣也候者功之不間斷也仍要五行之得其宜四時之異其用所謂不失其時者是也坎離合一謂之二候採取乾坤既交謂之四候得藥下關煉精化氣中關煉氣化神上關煉神化虛而合妙道以天地三百六十銖之正氣加父母二十四銖之祖氣而應周天之造化凑成一斤之藥物由是漸凝漸結漸採漸煉自子至巳以六陽時而進陽火自午至亥以六陰時而退陰符綿綿相續息息相關藥中有火火中有藥自然進退有度金木混融水火升降骨節靈通道在修巳以全其德明善以復其初以人治人以已度已丹徑非遙感一符之火候心鐙不昧耀三寶之靈光精義無窮取填在我是以三才五氣同效其能一本萬殊各呈其藴抱真守一道超太極之先出有入無法闡玄元之始自是瑤草琪花洞裡之乾坤不老丹臺玉室天邊之姓字常懸乾坤一太極吾道本來真理以參觀得功由積纍臻修道者靜以安身和以養神精以致真希高敦古忘形於塵俗之中克已知幾得性出雲霞之外有事無事常若無心處寂處喧其志惟一制念以定志自精氣之常凝保氣以全精乃丹圓之永固根深實茂相得不益彰乎源遠流長取之自裕如矣妙諦還從妙理求全真端要有真修精神氣化神來復此是超凡第一流所詢問渠子卷義取身心理參卦象探性命之原委詳火候之調和蓋謂天地者陰陽形氣之實體乾坤者易中純陰純陽之卦名動則為陽靜則為陰陰則為鬼陽則為神變化不測元亨利貞天尊地卑上下分從來六子首乾坤陰陽變化成男女無限玄機著意尋占來知往運用因心上天下地惟人至靈河圖洛書有理有數入我門來當求其故頤養天和規行矩步調之息之可久可大因奇器以煉大丹觀萬象而為變化昭昭之理靜參可得以奇名器即是鼎爐求其不差于火候須用純熟之功夫貴意念之不雜乃血氣之安舒總要此心能參此竅豁然貫通頭頭是道亥之後子之前總宜靜坐明吾心見吾性自可通玄常存施濟等願見善必為熟參靈寶諸書無微不照貴即境而因心遂悟真而合道時至豁然通祕奧洞明一竅是丹圓斬魔斷障郤欲消貪恍然照徹萬類不侵可謂大雄大智之道道法淸靈身心超脫修煉行功非淸不靈非超不脫
