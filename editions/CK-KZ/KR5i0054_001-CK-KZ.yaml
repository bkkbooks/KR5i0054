body:
  text: 微言摘要孚佑上帝著初修如望山林遠視糢糊難別漸近漸明漸行漸到到得山邊方識山行行行上上上又見草木與泉林始識煙雲變幻奇誠誠誠進進進登峯造極臨頂上萬物乾坤盡在中印證一輪皓月鑒明萬古千秋無邉道法勤參修養今須顚倒顚行持造化坎離先池中玉液頻頻嚥肘後金津轉轉還玄中妙妙中玄得此神丹益夀年谷關緊鎖眞消息終是天班不老仙勤採金花以助道風靜處煉氣閙處鍊神光風霽月景星慶雲無一毫乖戾之氣始合造化根苖但向起時作還於作處收蛟龍莫放睡雷雨直須休要會無窮火常觀未盡油夜深人靜後惟用子刻頭調息不廢眞氣從生今人精從下流氣從上散水火相背不得凝結皆是此心使然心苟愛念不生此精必不下流心苟忿念不生此氣必不上炎一念不生萬慮澄澈則水火自然旣濟姤結丹凝自古仙家眞作法惟秘玄牝得眞門夫玄牝者其白如練其連如環縱橫一寸二分包一身精粹在心下腎上處中坐靜觀照卽萌百日立基養成氣母玄牝立焉如爪蒂嬰兒在胎中救護補益流戊就已添油接命助火載金火熾旣濟胎成沐浴温養丹成丹成總于呼吸蟄藏氣穴神凝氣聚立基之傳物我兩忘收視返聽合光默默調息綿綿以致寂然不動之境然後待乎消息到來發生英令駕三車而上崑崙過紅橋而歸土釜精神聚會混合玄關元神妙用自然精氣與神片時凝結從微至著自小至大行住坐卧念茲在茲修證功完陰陽交感胎息氣足玄珠成象結成聖胎皆自然而然不知所以然自神而神不知所以神所謂陰陽數足自通神也眞火卽是元神之運行元神卽是眞火之妙用眞火隨眞息眞息隨眞炁眞炁化眞精眞精歸眞土極至入玄牝元神發眞火眞精自凝丹須明玄玄理築基丹道全腎水也水生氣氣卽火矣心火也火生液液卽水矣水可以滋流百脈火可以薰蒸四大離中汞坎中鉛眞鉛汞是先天一陽初動採鉛收汞取汞合鉛無非此息爲妙用以至水中起火天地循環乾坤交復無非此息爲斡旋其中沐浴温養進退抽添皆暎合天機濳孚造化而不容人力者眞人之息以踵踵深深之意神者非思慮之神此神卽火不神之神眞火是也用意家黃婆想自兩腎之中先天精一之眞氣以黃婆導引從左腹中右轉一週流入玄竅以鼻中一出一入之息爲一度如是九轉引先天精一之炁納入玄竅之中然後注意竅中以火煆煉此正取坎塡離煉精化氣用意之秘意土眞炁自成之道貴守中法在含元人欲盡淨天理流行月到天心光明自然混體全癡迷自破道法無涯機運黃庭道同天地萬載常存陰陽二氣藉土化生試看生無不滅應知滅無不生循環化機常理昭然乾坤轉水逆流坎化離水火濟眞炁屬陽精調和道始成息息歸元竅時時煆煉顯神功水中鉛火裏汞取來歸土釜温養鼎爐中不寒不燥非急非緩專氣致柔含光寞寞漸採漸凝漸結漸煉動靜之中更宜消息無象可象神結於氣氣結于神一意沖和包裹萬象混沌萬物生皆死元神死復生知寂照自圓通谷神不滅因胎息臍間元氣結成丹進進不巳長生門戸要綿綿煉演谷神息往息來無間斷眞玄眞牝自呼吸漸隨無念窅微覺有身浮以神歸炁穴丹道自然成坐靜功運呼吸明爐鼎須知玉蕊卽虎絃水銀是龍弦二弦之氣調停合和元氣得長存造化返天眞合元功聖胎成一時之中分子午卯酉優游沐浴功文武火煉丹爐工夫無間斷坐來自異靈鉛汞調和入土中迎送動止守成十二時中温養沐浴得玄得妙通聖通靈達境惟心出纒眞如下手確秘密丹工統在精進明心玄牝返照悉皆委之於意抱本還元性命卽歸太極第要誠堅詳參今書三百四十字深根固蒂守中抱一有心守之卽着想無心求之則落空如如不動寂寂兩忘神戀氣而凝命戀性而住不歸一而歸一不守中而守中性命由此立竅中舊物存悟明本源還萬事畢功坐金花顯顯玉蒂滋萌須用靜定之功剝洗往復之妙自知升降之宜然庚方月現子時癸生光天眞一之炁當是之時眞之正源至淸習定凝神愼其内閉其外意迎意送得天性之道天命之妙混沌爲一濳藏飛躍懲忿窒慾水火旣濟金木交併眞土歸位自然神歸氣復充塞天地黍米源根昊天沛澤仙道成功眞機妙用廓然無際渾然大中不偏不倚昭昭圓明本體洞徹何曾有碍至靈至神本無方所未有天地萬物先旣有天地萬物後元如此只如此至無至有至有至無乾坤之靈體元化之玄樞人人性命根萬類眞源本太極由出八卦從生便是道卽是易性由我定命由我立性命皆由我還丹道必成須用志不分坐而凝神卽可通造化之源然功坐至於心液下降腎氣上升得會至於黃房氤氲不散灰心冥冥丹芽肇萌虛靜之中丹其物内成明翕聚知蟄藏聚爲表蟄爲裏凝神入氣穴土釜牢封固運陰陽合呼吸以呼吸運神氣以神氣取水火以水火煉胎息胎息綿綿游泳坎離坎離交而生金液金液還而丹圓道涵天地神統百形形皆生滅性無生滅形難固性常存陽光一點超千劫煉育元神性海明能造形能留形常參道法知玄妙雙修性命合天機守斗守斗只言心口心口歸來何曾你有太虛照耀驪龍吟吼摩尼寶珠常常穿走大藥爲漿元陽作酒三五百十十一二九只此玄機請細分剖離得此些微豈能返衰朽絕慾則有鉛汞藥材生除妄則知眞土和合訣在苦志苦爲旣進復進苦不辭苦進不辭進開門若閉對面如無外行善事内躭善行依功恒習遵道敬行敬持忘其爾我純乎道德度世度巳不怠不慢養氣養元調和内外運以陰陽形神牢固愛欲力降巳知假合解得源頭歸源復顧假應是現旣假復假復假克除能保厥眞眞亦自固眞之固矣道在是也守一得訣忘機得道守眞一於天谷氣入玄元卽達天眞眞道養神若能守知於死氣之關枯骨皆有生氣生我者道活我者神將神守道以道養神致精氣神只在眞息上尋眞息爲先天之靈竅自其眞息凝聚不散謂之精眞息流行不間謂之氣自其眞息之妙用不測謂之神此所謂用先天用先天後天皆爲先天所化也其地之虛中皆天也日以陽下降可見地之虛處能受其人一身皆地也而玄牝一竅中虛卽地之虛天之中也在修道者性中一點神火照入卽三日所以搆精也搆精則庶物薰蒸山川出雲自無窮造化神淸氣逸總出自然凡有慧智之根者自能參悉息上也法在處紛不紛居亂不亂向上一着厯聖秘之凡世罕知心死原來一念無須知神活混元初一息尙存皆可常常長存尋出來時舊路元始祖炁相通息息歸根入竅漸漸通神達聖谷神何處立天根聖聖相傳玄牝門呼吸踵注於受生之初在母胞胎一點元陽立命之處上通於心臍後腎前中餘寸二卽名腔裏召搆靈陽呼吸綿綿内呼身中元氣外吸天地正息鼻之兩竅呼吸之端欲通祖竅守中抱一方纔子母會合得其破鏡重圓常操此心退藏脊竅則天地之正氣可扯而進與已混元眞精凝結丹田認定此竅守而不離久久純熟則裏面皎皎明明卽如月在水中方識長生眞可證飛昇本路此中尋功在不落人相不滯人情奮于自進大道生天地無私故常存天地生人物愛欲速其身哀哉世眾生難免輪迴劫是以上眞藴好生之德開度世之門道法無邊法在貴於呼吸暗注機竅丨一呼一吸得法暗注全欲一凝一結靈妙無端虛胎靜育虛極靜專含眾妙而有餘功訣玄妙神炁合一混一鴻䝉踵息純熟樂萬億之長春道本太虛胎息一炁天與地乃太虛之眞胎日與月乃太虛之眞息人體同乎太虛天地日月包羅無息不胎無胎不息胎從伏氣中結氣從有胎中息納炁丹田定心覺海若春沼魚似百蟲蟄浩氣融融靈風習習固守虛無涵養神炁知神炁可長生神行炁自行神住炁自住心定則神甯神甯則炁住無去無來無出無入胎息定金木交心意甯龍虎會住息長胎聖母神孩返本還元是眞胎息此傳法訣得飛昇千經萬典脫舍難難難難忙瞎煉抱炁冲和虛心靜默將一點眞元之炁踵注于臍腹正中默想玄會於虛間機竅内存無守有迴風混合超千劫復元初煉育元神道圓明微以意而定炁道原一炁貫虛空靈妙元神在炁中炁會於神神馭炁氣凝神聚法圓通目至心至心至意至意至炁至炁至神至行功採運貫悉煉守之法以期圓成只爲本本來一點虛明眞性命根藉陰陽五行陽火煅煉自然而成之至眞境界永劫不壞但玄牝一竅至玄至妙之機關人之眞氣一呼由此接天根一吸由此接地根往來必由此關口卽眞息呼吸之機關正爲玄牝一竅玄陽牝陰是竅也始有此身八脈九竅經絡聯凑空閒一竅穴至虛至靈藏於先天混沌之中隱於無有有無之内父母未生此身卽有此竅元氣所由生眞息所由起坎離交姤之鄕守中之境是其處鼎也凝結聖胎於此心下一竅名綘宮龍虎交合直下三寸六名土釜黃庭乃中田左明堂右洞房無英居左白元居右空閒一穴一寸二分藏精之所煉丹之鼎直下至臍門對過三寸六故謂天上三十六地下三十六至腎八寸四中丹田一寸二計來八寸四若明此竅易得金丹之妙鉛是先天炁汞是後天靈後爲先但得生鉛何患眞汞不生凡百作爲皆主於意色聲香味觸皆關於意意爲卽爲意止卽止故求丹取鉛以意迎之收火入鼎以意送之烹煉沐浴以意守之温養丹結以意成之故入藥鏡云一日内十二時意所到皆可爲此大要之要捷也道在天然法本無着不採而採方爲採不取而取始爲眞注意規中兩腎中有棲神窟橫穴周通一身爲治命橋守一實大道之本五千妙旨得一事畢天淸地甯發育無窮守一於玄竅大丹自成守一於天谷眞人自現守一於淸靜大道自成守一於虛空法超三界一統天地陰陽妙合妙合不散成眞乃得道在採藥人人本有不採則藥不成不煉則丹不結是以採取藥物于曲江之下聚火載之而上升於乾乾坤交姤於九宮之上周天運之而凝結於鼎逐日如此抽添如此交姤汞漸多鉛漸少久則鉛將盡汞亦乾乾坤交姤外藥先取卯酉周天内藥功成外藥一升一降後上前下内藥一起一伏左旋右轉道明中一竅妙宜通妙歸合一竅居中竅妙源流郤是同守一歸中連竅妙竅中妙一法神功火逼藥過尾閭乃坎離交姤須養子午周天之藥足有自然之眞火相逼尾閭沖透三關而上乾頂從喉而落黃庭是謂乾坤交姤之大周天也道歸于一一煉于無原一炁之周流憑蟄取以成形散之則有萬殊歛之復守於中煉一以靜煉靜以一煉一以虛煉虛以一道成於一丹圓于一意一而身心會心一而龍虎交德一而鬼神護誠一而道志堅精一而道基固氣一而抱於神神一而會于炁歸一而聖胎圓自歸一而得一自得一而超一有作有爲功用兼全天機自然固眞能不漏德厚定丹圓道重眞火眞火妙用煉乾金結大丹無火不煉無煉不結是以火爲至重厯古仙眞秘之自上至心之七節君火所寄其體内陰而外陽其用廣大而精微一身莫不聽命于心君故曰神明之主然其性上炎極易飛揚流動是以修丹之土必先制服其心使其火不炎于上得以下交於腎謂之水火旣濟制之之道至淸至靜則水火調而大藥生由心以下之七節相火所居是謂先天眞陽之火當無漏無泄使眞火之充足用以煉藥結丹故曰陽關一閉箇箇長生大哉眞陽之火人以此火而生以此火而養以此火而化精微以此火而發生氣血以此火而重結靈胎以此火而超凡入聖心下七節之火妙用無窮特發其奥遇緣難度道難堅志難夙根不昧更尤難先天之道雖不屬氣而太和元氣浩然之氣皆由此出所謂無炁而生炁而凡有血氣者莫不賴之以長上配乎天下配乎地天地氣合萬物發生乾坤交姤大道自成敬達内外陰陽三關訣道至尊功在勤先修内外驗分明修外藥煉内藥内藥無爲無不爲外藥有爲有以爲内藥實有無形質外藥實無有體用外藥長生久視内藥出有入無外藥外陰陽往來内藥内坎離輻輳外藥呼吸微微和神安靜内藥抽坎補離煉精煉氣欲待元神盈育須明坎離合體内外兼修金仙定矣功要誠三關合一之道陰陽内外作用夫三關者精氣之所寓然關雖有三其實無間隔煉精者以精交氣通中關煉氣者以氣交精通外關亦交神通上關煉神歸虛則精氣神混合無間三關通乎一也然精炁神卽藥物煉者乃火候化者卽丹候逆者乃返本還元與太虛一也三關雖外藥功夫内藥亦不能離修悟須洞曉兩箇陰陽於内外之作用耳内藥則巳自有外藥亦身中所出内藥精外藥炁兩不相離道原無着洞洞空空方寸虛明萬緣澄寂一息濳居炁穴片刻開混沌住息胎元自長安身立命須堅重開混沌守守守守靜長明固固固固眞不漏玄玄以藏默默以守坤母黃芽育之天地生意哺之此感彼應發邇見遠呼吸自開自闔動靜自由自在密守關元塵魔不侵訣秘坐卧長施瑩淨行止廣運修持六門不漏一道常通一孔玄關天地中息歸竅妙道圓通綿綿密密守虛靜寶鼎金花出世功眞體如如丹基永固得證無爲自在更須温養全眞丹從不煉煉中煉道向無爲爲處爲念起生生滅滅念息久久悠悠炁合神足移胎換鼎怡然安處濳藏飛躍在正一心金丹大道修行正路有作有爲以了命無作無爲以了性採藥結丹抱一冥心有爲作基無爲合道大道原來空不空工夫只在靜虛中陰陽升降知妙用金水周流道自通不知有爲而着於空謂之落空丹道之未巳成丹道之巳成謂之守屍有物非無物無爲合有爲無爲之中無不爲有爲之中又無爲得一復忘道巳成至眞妙旨甚分明若還執一難忘象入聖如何赴玉京訣要功空寂冥心冥心合道㝠心之道隱跡幽林深居靜室端拱默然一塵不染萬慮俱忘無思無爲任運自如無視無聽抱神以靜無内無外無將無迎離相離空離迷離妄體合虛寂常覺常明聖胎居于淸靈之境棲于不動之埸色不得而碍空不得而縛體若虛空安然自在若冥此心萬法歸一道原一心法貴虛靜心虛能覺心靜能知心誠能明心空能靈心定能慧心寂能感一切神通妙用皆是自心感現本來空寂光明覺照虛空瑩徹淸靜廓然周遍圓明皎潔如月景等虛空浩然無際心之虛空通於身之虛空身之虛空通於天地之虛空天地之虛空通於太虛之虛空虛虛相通共成一片自與太虛混而爲一始虛其心旣虛其身又旣而虛天地虛而無虛無虛而虛虛也不知無虛也不知使陽神妙用冲虛出入無障無碍光明不息自與天地合其德與日月合其明法界無邊包括一心下有小心七節命門乃先天龍雷眞陽之火所居人非此火不生丹非此火不熟統乎神炁毋漏毋泄丹入聖德行陰功念茲在茲至道易成無上至諦功由七節之中下手記由漕溪路運悟行此是根本工夫頭腦學問撥天關之手段脫死籍之靈章大道生虛空虛空運大道大道乃虛空之父母虛空乃天地之父母天地乃人物之父母天地廣大故能生萬物虛空無際故能生天地空中不空故能生虛空生天地生萬物皆是空中不空有以主之以其空中不空故能深入萬物之性主張萬物深入虛空之性主張虛空空中不空乃謂眞空眞空大道之根道原淸淨空空蕩蕩晃晃朗朗無有無住冥心本乎無住無住性體圓融住無方所故名無住心體能知知卽是心心本空寂至虛至靈空寂而知名先知虛靈而覺名先覺不慮而覺謂正覺不思而知謂眞知心常寂是性體心常知是性用自性自知自性自用自性自見自性自悟自性自度無心之心謂眞心眞心是性眞性是心了性眞心了心眞性一旦天機透露慧性靈通恍似夢覺現出乾元境界充滿上天下地此是性體常明烱烱不昧晃朗宇宙照徹今古雖開月眼之具而開慧眼之光雖是凡心而成神仙之智變化無方神仙莫測居塵出塵成眞可證陽生於子造化元基氣運流行易卦爲復覩乎外象閉藏内含生意胚胎萬物一元資始是以陽從地起發無窮之化育夫有定者天地之子時無定者修行之活法忘五官之用息内外之機微微呼吸默默守聚至於杳冥之際便得恍惚陽生心淸而性現性現而神靈神靈而命立神心命氣得以相依於玄竅氤氲盤結於黃庭煉而不散自得丹圓成熟妙用無窮修德行仁上淸之所重道不離德德不離道氣通息定念無生滅息有一毫之未定形非我有還歸於陰念有一毫之散亂神不純陽仍輪轉于諸趣守固無漏泄數足自丹成道不離性性不離德性欲德復道以性成心之靜性也動情也動而不止欲也情性與欲同出而異名性本善情欲一萌而有惡焉情動欲萌知誘物化化化未巳心存無幾至人以德復性則爲聖智眾人以迷失道則爲凡愚聖智凡愚之分在復與不復之間非參不悟非修無證宜體認於時時每提撕於疑似靈丹一味眞一亥水水實產于金鄕採服卽可飛昇水如非火旣濟無機故必天七以成之火得與之合而水火始有旣濟之功金如非木招攝無自故必地三所生之木得與之合而金木始有招攝之妙又必水裏生金火中生木顚倒互用天七地三迴相爲守上升下降五行周流而成丹謂之一合九一者先天眞一之炁九者後天老陽之數由一陽而至于純陽之謂也丹結則神液如玉石落落而下爲身至寶灌漑靈根漸以成形超神入化仙道成矣成眞得道由於金水相生之妙運用之精腎居水府負陰抱陽靜煉眞陽氣足修得無漏還元炁結陽精一點是爲眞金至寶還丹妙理出于天機化育無窮天機不息凡有根源一息尙存莫不可以修眞均得證於道果人自有生形骸臟腑原爲後天本於先天元神眞炁本於先天統乎後天藉父母之陰陽一炁而形骸之後天有之知覺運動實賴元神統之成眞證道必藉形骸養育坎腎原爲眞水精炁出于腎中精以氣而化水水出氣而化精是以精金能生水故生金精之炁法喻眞金點作喻思氣化精時氣在精中精化炁時精歸炁中故曰金爲水母母隱子胎水爲金子子藏母胞母藏子腹如金在水中精復于炁水中出金當修煉之初如從根發出苖先而爲藥乃虛無之炁耳實無形相而虛無恍惚採不見所採取不見所取採取之久火候之足精還補氣之盛謂之丹成其氣之發生始有法成之妙相而陽化之炁根始動以其是金炁也故有金丹之號道合天時子午運行人有任督如天子午二脈分乎前後本一源而兩歧任脈起于臍下四寸穴居中極之下前陰後陰之交名會陰穴任由會陰而行腹督脈之源亦起會陰少腹後骨中央由竊漏而行背夫背後尾閭夾脊玉枕曰三關謂之督脈本屬乎陽前面上田中田下田曰三田謂之任脈本屬乎陰修丹之士煉至眞氣充足消息到來下田忽然如火向尾閭沖關透竅此皆眞氣自家妙用二脈交通眞氣逆升自背後督脈中上來卽屬于子自前面任脈下去卽屬于午子午抽添謂之周天火候身中水火一升一降升則爲進火謂之抽鉛降則爲退符謂之添汞鉛是一點眞陽之氣汞是一點眞陰之精二炁交感則凡精凡氣皆化眞炁爲純陽之體益水進火升降無非一氣氣之升以心接之爲火氣之降以靜待之爲水此綿綿若存之時乃子午進用之功道在乾坤法重鼎爐非淨不能安爐非淸不能立鼎道由于數緣在數中肇鴻濛而判二儀由二儀而生八卦情現萬物機緣始終均得包乎數内無非寓乎世緣得失數也行止數也道也數也機遇緣也聚散緣也道也緣也非緣而莫遇非數而不成一始而萬派萬派而終一五行以意之緣合八卦以一之數成修道長生訣在心靜氣定心忘氣凝氣息心空心氣渾一明心見性須靜篤而誠煉身中之元精不離元氣煉到氣足而無漏竅將腎中眞元之精而返成氣得元氣足如童子之完體便可長生修至德厚宏深法力精純自與天地同久則爲仙矣一神之妙一意之用意遠而神遠意近而神近意變而神變意收而神收神由意意由神身心意到底不離非意之運用安能超出乎天地是乃出神入化之密旨修眞之士窺破有限之軀修煉猶恐不及慕道常如飢渴悟中悟進中進淸中淸靜中靜使一神之澄徹會五氣於黃宮陰陽合而萬物生水火濟而眞炁凝大道不離方寸妙穴常存至道月照丹臺潮生海底箇中玄妙處就裏見眞詮粉粉碎碎空空洞洞太虛中何曾有物乾坤内如何發生靜中靜動中靜動靜之機化虛中實實中虛虛實之理證幽微玄妙道無邊際由乎天地返乎人身神理獨超萬物炁機重立乾坤否極泰生天機地發陰陽五行化育之道原在吾身陽動陽動藥苖生漸生漸長要工勤養成無極太和枝返視黃芽照眼明這段玄機應識莫教錯過光陰否極原來功用時泰生始見藥苖新無功用怎見藥苖無藥苖不明功用功足用到大藥現靈苖長採採採採來配合混元丹取取取取來團作長生藥一時間天機煥發萬象盡含春道以淸靜爲宗德行是重誠修誠煉閉竅爲無漏之因元神妙用于屯䝉眞氣升降而姤復父母生前元始初復金水功用金水的旨混沌初分刻眞人入綘宮根源一點注玄門漸染萬端塵忘郤本來身僞僞無邊妄妄踵生從此來從此去眞不眞迷復迷堪惜踪影難尋那識元初本景有捷路上瑤池由開闢覔因由無窮造化箇中藏今古神仙就裡出試悟因由如何開闢只是綘宮一念塵非頃刻靈源幻化順流交泰圓成天開地闢覔因由造化無窮萬法通今古神仙從此出均從交泰一源頭不息不息機緣無盡一點無明前因後因因緣湊合心火隨意土順而成旣濟於此立根源靈明甯有極修眞修眞反順于逆腎水隨意土逆而成旣濟靜中動動中靜自入三淸聖境確信長生妙理水升火降逆成仙也精微至要在于坎離法重水火之金煉貴紅黑交凝火中之熖觸物成濕丹家謂之木汞卽火中之精心中之眞液也水中之炁浮而成煙丹家謂之眞鉛卽水中之金腎中之眞炁也離宮火熖屬眞陰靈液紅光汞在心欲識水中金的旨眞鉛陽炁坎宮尋煉煉煉降離火以煉坎水之金以紅而投黑神凝而藥自生于坤臍制制制升坎水以制離火之木以黑而見紅神凝而丹自成於乾頂故修丹之士必以水中金爲至寶動靜功用必合金水機關方臻天然妙理欲煉太虛同一體逢人先自學如愚百日功靈初證便得長生無漏無漏精巳化氣下田爲藏精之府中田爲炁海之源化炁歸臍臍乃中田百日巳得長生爲人之仙若用以服食炁便化神神得氣化神成眞體十月圓成自當遷于上田若只拘神在上亦是長生超劫之愚夫而無神通之妙用須用出神之理調神爲身外之身且調且養濟世積功保護三春方能達天通地萬化千變謂之神仙若厭住於世則可從仙而還虛以證無極之至極爲上乘之金仙矣水火本爲相剋坎離旣濟又反相生故貴化神至靈紛體則易消故貴變是以散化五行而變通萬神上天下地一炁流行陽數至九而純九氣陽純煉去陰邪映發光華出於霄漢靈魂居上關元居下陽屬於炁輕淸而升爲魂至虛至靈全具於心陰屬於血重濁而降爲魄質從水凝源出於腎密戸生門出入日月呼吸長存飛昇而仙自此以下俱釋黃庭内經大道之源眞一元炁先天之我藴而藏之心外原無道道外本屬無心方寸之中存存念眞眞我自藏藏而不露方以矩成不免有稜角之滯圓以規運不免有轉動之勞牖以納物不免有外引之隙窻以通明不免有内窺之竇此所藏之眞則不方不圓和光同塵常寂常應閉窻扄戸守禦固密屏除外欲三神集而精還老當復少戊陽魂巳陰魄惟三神之精不還遂致魂魄不甯故不能守其眞戊巳合眞魂魄相拘而方寸之中一元内守和順從容何爭何競神生腹中金液滋滿而如玉之鐺元神靈炁注于幽關常存不失注其根如琳瑯之條蔭茂萬尋可爲恃仗丹靈神通五氣朝元天眷卽邀華葢覆珠九幽光燦以内照而外觀朗如日月之明麗空洞察眾有悉陳審能自見赤珠靈帬虛靜而顯圓明光動而生靈妙光華蒨燦輝煌普照意本從心一入於邪無所不至故見心但屏外誘修脾當克已私生生不息訣在存眞各眞其眞本體精明内自運乎天經天經一氣流行生生不息之脈絡晝夜功用勤勤仍須意念存存内出惟寡外入惟眾知内以感乎外知外以應乎内上致明霞日月華發參破生門之訣下手着着存神漸漸合延延生華芒存思登虛殊途一會相有而不可無相資而不可離配合待對之體相望相求之情殊念經翔長生出世萬象昭回開通七竅俟一氣之流行卽以進陽退陰火力爲先符佩爲圓尙修於靈關金唱于前木繼于後前者昻後者卑昻者高卑者下心樞天定萬目鋪張黃極正名紀綱畢舉故以前昻而後卑使高下之皆陳由是執雌雄之神劍迴七十二候之要津舞百丈之錦幡奪三千六百之正氣劍乃金水之精所鑄幡乃龍虎之炁所融一數之始十數之終戊午巳五合而成十絕其危險錦幡百丈火龍凝金水眞精鑄劍靈一始十終成二五煉來妙合巳全形黃中扄固虛靈槖籥扇動巽風元氣紛紜當此元氣鼓滿水火受制非制之有法則火龍飛逸煙熖騰空惟金得用乃火因水之上升而下降沖霄之烽煙方歛息與金結作一團百煉沖舉千變萬化微妙圓通周天三百六十五度陰陽升降自然不息一身之内與天同符上而泥丸玉池玄膺降而重樓明堂鵲橋元海下而尾閭湧泉其間六脈經絡正如星辰之纒次嶽凟之尾輪五臟六腑以配五行合乾坤之呼吸出日入月首圓趾方均相符合而運用之精盡于内景經篇眞經出世之源由上眞司命柴母元君慈度得道眞仙無不由此經精研入聖道法于元連珠循環天元行乎六陽地元行乎六陰太陽到午太陰到子二物合璧于中元如珠之連周而復始運行不停乃天道也握固以足元神則當觀天之道執天之行法陰中之陽地中天元升於午法陽中之陰天中地元降于子會中元而循環不息則五臟之精英落落光明明景内照如燃炬通霄光被九隅煥映八區黃紫燦然丹結於内充溢繁盛陽升陰降如日月之合璧五行環轉如列宿之交陳外而七曜光明内而九元相聚光彩如霞錦玲瓏似玉華津液滿口而灌漑天機在我斗柄橫空映發光明上透霄漢迴紫抱黃瑞色集而丹圓大道生天生地生人自未有天地之前卽有其主持造化天地皆其所生天地旣分之後惟得舉功而歸之於天從道名太玄圓覆之本體也太和陰陽合會之元炁也有此太和元氣流行不息生人神氣凝而聚丹大道原生天地人陰陽合會本來眞流行不息無窮止宜化功由覆載春則太玄之本體惟是無爲而巳故太玄太和挾持端本元氣化生萬物卽可本此元炁而作仙由得太和元氣入於身中養成玄珠與上天太玄之體同其運量得以飛昇一氣調平陰陽自合心爲一身之主氣爲周流之帥道德原具心中動靜毋間其功道德始爲我行意念從心所發媒合中央水火念念無間淸虛靜潔因得善炁相迎自然煥發光明心光内照從心主宰行則燭照事機如耀息則靜養平旦收藏妙合陰陽莫非此心之運用故能通利精神調理陰陽法週天之數經厯六合優游卯酉爲沐浴之鄕雖不行其火候而一神常抱須臾不離火上炎而本升水潤下而本降運轉迴環水升火降蓋離中原有一陰環轉則升起坎中一陽剝轉離中之陰而成純乾此爲轉降升藏九爲陽數雄陽雌陰白陽黑陰先天眞一之炁爲一陽原具坎陰之中内實有眞陽之炁知採陽鉛始得結胎成聖用吸返元訣修丹證果處中制煉復立乾坤混金鑄就一炁陰陽交泰逆用乾坤反覆水火木金四象寄土於中各旺以一氣之會合而玄珠成象制煉還源法處中乾坤復立與天通混金鑄就長生體會合丹成十月功土從火生色赤如丹則明交後之色象識未煉之功用離位前仰坎位後卑各有其門火自木生水自金生水火雖異而可合以還丹惟收天一之玄泉逆流以成至寶色赤如丹火土生坎卑離仰各分明玄泉天一頻採取送入泥丸至寶成然如龜之鼻自然引氣靜以得其炁之往來而無出入之跡象龜之引氣方能制其靈根運歸土釡靈根本是眞人眞人在中能取首經之金以煉方成彼則負此金爲甲持火爲符開通七竅之門奪得子來吸受金精有此玄泉送以還丹實爲用吸返元訣要今古諸仙由此飛昇如龜引氣法天然虛靜微微妙裡玄二土運成刀圭藥飛昇金煉五行全五行幻化運用精微撮而爲一寂然固藏散之爲萬周遍世界無盡而有盡有盡而無盡有盡爲塵生塵滅無盡爲修證修果夫一氣之流行聚散本無常經陰陽原屬混融五行禀受眞源生寄也滅歸也任其散而不收焉能寄而不歸攝其機而撮合自然萬古不磨虛兮靜兮得其淸甯撮兮聚兮得其靈脈合一陰陽一氣本流行聚散原來萬物情撮得五行歸一處不磨萬古自淸甯知謹固用運升降自然妙合天機温蒸生物無形而化有形神也氣也陰陽五行也撮合以成其妙凝結以致其神神依氣而堅氣依神而化修有實證之驗煉有可計之程返本元於百日育至神於十月調攝三週妙用無邊用撮之法歸一妙諦宏慈廣布委脫飛昇自然升降合天機始得温蒸生物奇神炁相依無化育還丹證果約程期雲蒸雨布灌漑五華靈根堅植元氣滋溢紫煙上下周流三素氤氲騰躍氣運其脈血滋其液自然通達流動方能冲廬入鼎幽室陽門光耀現色瑞於三田雲蒸雨布漑靈根元炁氤氲金液盈通達自然成妙用衝廬入鼎育元精天開地闢歸根復命玉液太和頃時天地會合冲和炁釀瓊漿玉㽔初生金關重扇機動樞轉脾運靈柯鼓扇兩扉坎内陽鉛得渡上接離中陰汞鉛至汞迎彼到我待由金闕而上升從玉籥而下降調和往來全是靈柯運用樞機貴宻方得陰陽媒合醴泉香潔太和羹無極爐中玉㽔生靈柯鼓動天機轉媒合陰陽自降升虎躍龍騰精氣混成自得津生玄竅方能洋溢玉池舌下爲玄竅口中爲玉池䑛拄以迎甘露毋使滲漏妄溢得此瓊漿太和氣化實由金生之水爲養丹之至寶漑灌周流無飢無渴世味遠而眞神旺金津現而道成矣津生玄竅玉池淸虎躍龍騰炁混成䑛拄謹迎甘露降靈泉灌漑養眞金此用䑛之要訣閉關握固塞漏禦洩止念除妄澄徹靈明使精足而氣旺則神全以運用虛無爲天之體人禀先天一炁亦自虛無而來虛者實之基無者有之根旣實而有遂至萬有紛紜不能返一虛無是以去天日遠一乃太極虛無爲無極惟得一長生乃能虛無所貴秉德堅修勇猛精進虛無一體與天通萬有紛紜道不同若能秉德堅修志得一長生出世雄大道虛無由於得一修一煉一謹敬防守毋使漏洩蓋氣漏形枯尤當專氣致柔垂簾塞兌謹加閉守而御景忘機永長甯謐淡然無欲三奇通靈謹加閉守靜忘機返照淸明自見奇涵養谷神臻至妙五行神化夀天齊閉視返照内體淸明謹守至寶如龍護珠三房通達谷神不死積功純一壘德重重此爲用閉之訣以上自用吸返元訣至此乃吸撮䑛閉四法爲入道徹始徹終上古未傳秘要隱明蓄氣微妙斯明靈丹内著煌煥于中當蓄氣以致眞宜隱明而進煉惟暗于外以明諸内蓄伏于下而逆於上窮微入妙日益知彰吐熖光芒漸靈漸澈必先之於混俗天機方能活潑居閙中以煉靜眞源始有把握脫姤離塵淸虛入妙一眞自現日月輝光玄丹爲物晰之爲三則曰精炁神統之爲一則曰本元正一惟三炁逆而右迴則内陰之九竅返照光明而正一之眞丹含蓄英華積累充溢遙望一心之中日月合璧五星聚奎如北辰之樞中星羅列環繞於中自使氣固神全室堅於金眞元不傾返還永固居中御外經厯六合高而泥丸天谷卑而綘宮玄鄕炁固神全渾似金眞陽出自坎宮陰周流六合無窮極神室靈丹貫古今腎之精水之金天地之祖炁順行而爲常道逆行而爲仙道成人成仙關鍵妙用故順行為五濁世間法結精育胞而成胎化生逆行乃顚倒坎離留胎止精而淸修亦孕長生超出惟在淸虛證果變化圓通原是一神入妙道眞神衞積功純一閉視返聽内景光明自然通體神全方能氣溢三田丹非外物原起於形生之中卽以其人之道還治其人之身始初本爲我物今則喚來歸舍途非遠濶近在三宮只是坎離戊已得于混一還元易于隱微通括收攝成其造化眞一之源原從靜裏出來而虛無寂寂色自空中素質散現使在形中通達洞視高潔陽明用時慧定生明九室虛而能受正爲神明所舍神旣守而不去猶當愼終如始息息守藥念念中規得棲吸聚源神脈抽添温養視乎節度脫胎換骨非復頑然血肉之軀遊行天地翺翔自得得超欲界於紅塵輪刧身入淸微禹餘太赤之境矣以上十五節釋黃庭神氣機關統地天靜中妙用化形仙長春駐景非虛幻勤詢先修出世筌中一混元動靜機分陰陽施化二五交凝如天之妙大易已著其文其動也闢其靜也翕不闢則不翕不翕則不闢闢兮翕兮生育無窮動極生靜靜極生動一動一靜互爲其用一升一降成其造化此皆靜極之功出于自然莫錯過眞子陽生應覺玄機動處方明急水灘頭下篙無絃琴裡知音妙妙妙玉蕊初生元元元金闕初關天然眞火燭虛空水裡機關炤斗牛日月循環轉烏兔結姻緣道本陰陽淸靜眞宗法先補救一身之内一氣相求乾坤定坎離交水火濟化機生心火腎水眞液交凝可奈凡塵有錯悟修行本旨者妄爲愛欲自促天年夫情動慾生火熾水涸眞機濳息安得長生一念之非萬刼難尋大道全眞五官忘用息機内外體合太空湛然一性靈明忘而不忘規中一炁綿綿息而不息寂寂不動默默守聚杳冥恍惚之際造化融成一片源于臍腎之間晝夜功無間斷彌厯十月奪大數於天地得乎片時成妙用於水火固志抽添念動而散入卯之門法當抽回使念靜而息定出酉之門法宜添起使奮迅以調進念更無念丹圓純熟全眞大道至神至妙無非一眞妙用皆由神炁凝成是以有志長生歛其神以藏用攝其炁以藏神道證眞全長生萬古天地盈虛陰陽升降往來運行消息乎中一陽生于庚方陽純滿于甲地陰衰陽盛丹結圓明性命全形惟在陰陽合一靈奇微妙尤貴逆旋造化因炁凝神以命合性無爲妙理惟簡惟易一水初凝炁化金生由金炁以化精從煉精以化金精以立基基築下田靜極精無漏竅自得炁化遷中精返於炁大藥苖生已得神氣歸根方爲性命合一神由氣煉煉炁化神神成而遷於上由上以出重樓皆自然之妙實化生之本道本陰陽交感化生陽剛陰柔互爲興起分剖以列四方子午基於動靜運成綱紀合乎易數一者水之生數九者金之成數一而九九而一北而東東而南南而西終而復始坤亥含元交感陰陽造化生剛柔動靜運成功數歸一九金中水西北東南始復明無陽不生無陰不化非神無以交炁非炁無以凝神毫妄動危險隨至嚴密關鍵進退有法靜補本元之氣淸救天性之神昔曾有言傳世吾道雖是房中得之然非御女之術耳絕慾不漏坎水充足腎氣上升心火下降交感氤氲羲文旣濟甘露瓊漿天降金波玉液地升潤枯枝成造化三才渾一仙家玄妙至陽赫赫至陰肅肅天地位而發育致於中而自和非中不和非和不育道在守中化機和煦一陽始動娥影生輝法天應地一體彰明至誠佈德重重陽光舒熖綿綿堪惜世界凡夫舉念不善厲氣滅光自墮沈輪是以道藉于德德護于道無德則光不舒無道則光不眞道德並隆陽光至眞在於無念以發其光囬光以育其光翕闢以煉其光固守以成其光光中有氣氣中有神神中有炁迨於圓明修應混俗天機方能活潑閙中煉靜靈機免於澁滯氣發乎地神通于天三元妙合八卦彰明龍騰而雲從虎躍而風生雲從雨降風生火現風雲水火際會交融結成一片卽是靈丹機兆得先瑞徵于後虎躍陽生應類而動必忘情而無念務靜氣以調中汞液由根始發鉛華自蒂而生一陰一陽消息一往一來妙用化無生有化有生無藉眞意以媒合歸土釜而熬煎迨於明生昴畢必自始於箕斗兩弦平直二八功成三才合一道體通明虛極靜篤便覺陽生于地方識金萌水際呼採吸取自然陰降於天乃得木生火中先天混然造化在中探玄知妙尋覓眞踪眞踪眞踪南北不分東西難隔四歸于一月色光輝初照地底雷鳴方動乾坤春意融融方顯修行面目出世因緣大果以日魂之升沈應氣血之升降以月魄之盈虧應精神之衰旺以四季之節候應一日之時刻以周天之星數應一爐之造化採精神以爲藥取靜定以爲火以靜定之火而煉精神之藥效日月之運用與天地以同功幽濳變化重其用而不重其體主宰造化重其體而不重其用心中有神精中有炁心之神有中無也精中炁無中有也心爲一身之主神到炁到氣爲生育之根炁旺神旺合陰陽而交感配造化以飛昇必使心如止水方能炁自雲行氣本有自行之路且有必行之勢反在無心得之非關意所能行固守精神則心地自然光明心光内照則法體便得圓通人之心身一小天地秘鑰玄關栽培元氣氣之所行一日一周功宜涵養無待他求元氣流行一日週栽培涵養要誠求若能整密加功去此是周天第一籌純陽純陰故分九六各有所用一畫二畫變而爲屯爲䝉盡是易理所伏其中變化無窮須要靜參可得虛靈未可染纎塵無着無依最渾淪只待感通分動靜方知造化貴存神淸心一點萬理俱玄靜性參玄無微不入吃緊功夫當在幽獨非正心以修身大道莫見不存心以養性至理難窮秘中訣不老春靜裡觀自心朝暮持參詳虛中之極以虛而受靜中之運以靜而成散者成氣聚者成形葆至眞之氣以全性最玄最妙本至精之氣以立命通聖通靈葢天之覆地如卵之包黃太極旣生兩儀乾坤乃生六子二氣交感禀元化以絪緼萬物資生轉洪鈞而孕育故三才有天地人之分一身有精氣神之別坤在靜中求動有爲始于無爲必須伏炁乾在動中求靜有象歸于無象只是還虛煉日烹月火蓮開于池爐旋乾轉坤眞炁通乎槖籥陽九陰六地天交合而爲泰男上女下澤山相感而爲咸事有萬殊理歸一貫生生不已旣已閱人成世閱世生人刻刻參詳須知無時不然無處不有吾道雙修立功立德藥物觔兩火候要熟夫火者吾之眞神炁也候者功之不間斷也仍要五行之得其宜四時之異其用所謂不失其時者是也坎離合一謂之二候採取乾坤旣交謂之四候得藥下關煉精化氣中關煉氣化神上關煉神化虛而合妙道以天地三百六十銖之正氣加父母二十四銖之祖氣而應周天之造化凑成一觔之藥物由是漸凝漸結漸採漸煉自子至巳以六陽時而進陽火自午至亥以六陰時而退陰符綿綿相續息息相關藥中有火火中有藥自然進退有度金木混融水火升降骨節靈通道在修巳以全其德明善以復其初以人治人以已度已丹逕非遙感一符之火候心鐙不昧耀三寶之靈光精義無窮取塡在我是以三才五炁同效其能一本萬殊各呈其藴抱眞守一道超太極之先出有入無法闡玄元之始自是瑤草琪花洞裡之乾坤不老丹臺玉室天邊之姓字常懸乾坤一太極吾道本來眞理以參觀得功由積累臻修道者靜以安身和以養神精以致眞希高敦古忘形於塵俗之中克已知幾得性出雲霞之外有事無事常若無心處寂處喧其志惟一制念以定志自精炁之常凝保炁以全精乃丹圓之永固根深實茂相得不益彰乎源遠流長取之自裕如矣妙諦還從妙理求全眞端要有眞修精神氣化神來復此是超凡第一流所詢問渠子卷義取身心理參卦象探性命之原委詳火候之調和葢謂天地者陰陽形炁之實體乾坤者易中純陰純陽之卦名動則爲陽靜則爲陰陰則爲鬼陽則爲神變化不測元亨利貞天尊地卑上下分從來六子首乾坤陰陽變化成男女無限玄機着意尋占來知往運用因心上天下地惟人至靈河圖洛書有理有數入我門來當求其故頤養天和規行矩步調之息之可久可大因奇器以煉大丹觀萬象而爲變化昭昭之理靜參可得以奇名器卽是鼎爐求其不差于火候須用純熟之功夫貴意念之不襍乃血氣之安舒總要此心能參此竅豁然貫通頭頭是道亥之後子之前總宜靜坐明吾心見吾性自可通玄常存施濟等願見善必爲熟參靈寶諸書無微不照貴卽境而因心遂悟眞而合道時至豁然通秘奧洞明一竅是丹圓斬魔斷障郤欲消貪恍然照徹萬類不侵可謂大雄大智之道道法淸靈身心超脫修煉行功非淸不靈非超不脫
